# ===========================================================================
# FundIQ — local development stack.
# Production uses Neon (managed Postgres+pgvector), Neo4j AuraDB, Upstash Redis.
# This compose file replicates the same surface area locally.
#
# Run:    docker compose -f infra/compose/docker-compose.yml --env-file .env up
# Build:  docker compose -f infra/compose/docker-compose.yml build
# ===========================================================================

name: fundiq

services:
  # -------------------------------------------------------------------------
  # Postgres 16 with pgvector pre-installed.
  # Mirrors Neon production. pgvector enabled via init script.
  # -------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fundiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fundiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fundiq_dev}
      POSTGRES_DB: ${POSTGRES_DB:-fundiq}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fundiq} -d ${POSTGRES_DB:-fundiq}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # -------------------------------------------------------------------------
  # Redis 7 — semantic cache, embedding cache, prompt cache, Hatchet broker.
  # AOF persistence so cache survives restarts during dev iteration.
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: fundiq-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -------------------------------------------------------------------------
  # Neo4j Community 5 — grant relationship graph.
  # Heap explicitly set; defaults balloon to multi-GB on container start.
  # -------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: fundiq-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-fundiq_dev_neo4j}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # -------------------------------------------------------------------------
  # FastAPI app. Bind mounts source for hot reload; excludes __pycache__.
  # -------------------------------------------------------------------------
  api:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    container_name: fundiq-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fundiq}:${POSTGRES_PASSWORD:-fundiq_dev}@postgres:5432/${POSTGRES_DB:-fundiq}
      ALEMBIC_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-fundiq}:${POSTGRES_PASSWORD:-fundiq_dev}@postgres:5432/${POSTGRES_DB:-fundiq}
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-fundiq_dev_neo4j}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-fundiq}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ../../backend:/app/backend
      - api_pycache:/app/backend/__pycache__
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pg_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  api_pycache:
