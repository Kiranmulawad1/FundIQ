# Alembic configuration for FundIQ.
# The database URL is supplied at runtime by alembic/env.py
# (derived from Settings.alembic_database_url), so the static value
# here is only a placeholder for tooling that prints config.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

# Chronologically sortable filenames in alembic/versions/.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Use timezone-aware UTC timestamps.
timezone = UTC

# Placeholder — real URL injected at runtime.
sqlalchemy.url = postgresql+psycopg://placeholder

# ------------ Logging ------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
